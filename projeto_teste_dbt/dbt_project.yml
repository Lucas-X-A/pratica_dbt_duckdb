name: 'projeto_teste_dbt'
version: '1.0.0'
config-version: 2

# Nome do perfil definido no profiles.yml
profile: 'projeto_teste_dbt'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Configurações de Materialização
models:
  projeto_teste_dbt:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +schema: intermediate
      +materialization: view
    serving:
      +materialized: table
      +schema: serving
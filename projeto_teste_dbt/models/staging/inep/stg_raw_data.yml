version: 2

models:
  - name: stg_raw_data__icg_escolas_2025
    description: "Staging da tabela de Indicador de Complexidade de Gestão (ICG) - 2025."
    columns:
      - name: nu_ano_censo
        description: "Ano de referência do Censo Escolar."
      - name: no_regiao
        description: "Nome da Região geográfica da escola."
      - name: sg_uf
        description: "Sigla da Unidade da Federação (Estado)."
      - name: co_municipio
        description: "Código do Município onde a escola está localizada."
      - name: no_municipio
        description: "Nome do Município onde a escola está localizada."
      - name: co_entidade
        description: "Código INEP da entidade educacional (Escola)."
        tests:
          - not_null
          - unique
      - name: no_entidade
        description: "Nome da entidade educacional (Escola)."
      - name: no_categoria
        description: "Categoria administrativa da escola (Ex: Pública, Privada)."
      - name: no_dependencia
        description: "Dependência administrativa da escola (Ex: Federal, Estadual, Municipal, Privada)."
      - name: complex
        description: "Índice de Complexidade de Gestão Escolar (ICG)."

  - name: stg_raw_data__ied_escolas_2025
    description: "Staging da tabela de Indicador de Esforço Docente (IED) - 2025."
    columns:
      - name: nivel_1_ed
        description: "Porcentagem de docentes da escola alocados no nível 1 de esforço docente."
      - name: nivel_2_ed
        description: "Porcentagem de docentes da escola alocados no nível 2 de esforço docente."
      - name: nivel_3_ed
        description: "Porcentagem de docentes da escola alocados no nível 3 de esforço docente."
      - name: nivel_4_ed
        description: "Porcentagem de docentes da escola alocados no nível 4 de esforço docente."
      - name: nivel_5_ed
        description: "Porcentagem de docentes da escola alocados no nível 5 de esforço docente."
      - name: nivel_6_ed
        description: "Porcentagem de docentes da escola alocados no nível 6 de esforço docente."
      - name: nu_ano_censo
        description: "Ano de referência do Censo Escolar."
      - name: no_regiao
        description: "Nome da Região geográfica da escola."
      - name: sg_uf
        description: "Sigla da Unidade da Federação (Estado)."
      - name: co_municipio
        description: "Código do Município onde a escola está localizada."
      - name: no_municipio
        description: "Nome do Município onde a escola está localizada."
      - name: co_entidade
        description: "Código INEP da entidade educacional (Escola)."
        tests:
          - not_null
          - unique
      - name: no_entidade
        description: "Nome da entidade educacional (Escola)."
      - name: no_categoria
        description: "Categoria administrativa da escola."
      - name: no_dependencia
        description: "Dependência administrativa da escola."

